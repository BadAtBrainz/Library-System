
{% extends 'base.html' %}

{% block content %}

<h1>📚 Book Collection</h1>

<div class="book-grid">

{% for book in books %}

<div class="book-card">

    <img src="{{ book.cover }}">

    <div class="book-info">

        <h3>{{ book.title }}</h3>

        <p>Author: {{ book.author }}</p>

        <p>Year: {{ book.year }}</p>

        {% if book.status == 'Available' %}
            <span class="available">Available</span>
        {% else %}
            <span class="borrowed">Borrowed</span>
        {% endif %}

    </div>

</div>

{% endfor %}

</div>

{% endblock %}
